`)}var rd="https://developers.webflow.com/browser/reference/consent-management",Uo={onetrust:{url:"https://developer.onetrust.com/onetrust/docs/javascript-api",label:"OneTrust cookie consent JavaScript API"},cookiebot:{url:"https://www.cookiebot.com/en/developer/",label:"Cookiebot developer reference"},usercentrics:{url:"https://usercentrics.com/docs/",label:"Usercentrics Web SDK documentation"},trustarc:{url:"https://trustarchelp.zendesk.com/hc/en-us/articles/43771883505683-Integrating-the-Consent-Mode-v-2-0-Using-Google-Tag-Template",label:"TrustArc consent mode / PrivacyManagerAPI guide"},osano:{url:"https://docs.osano.com/",label:"Osano developer documentation"},ketch:{url:"https://docs.ketch.com/",label:"Ketch developer documentation"},didomi:{url:"https://developers.didomi.io/",label:"Didomi Web SDK documentation"},cookieyes:{url:"https://www.cookieyes.com/documentation/",label:"CookieYes documentation"}},J={onetrust:{name:"OneTrust",gotcha:"Watch for: Optimize firing before OneTrust resolves consent. The deny-by-default in the snippet handles it.",detect:"window.OneTrust or window.Optanon is present and OptanonWrapper() is defined.",cat:{marketing:"C0004",analytics:"C0002",functional:"C0003"},catNote:"Webflow's recommended pattern uses OneTrust.OnConsentChanged and reads OnetrustActiveGroups. Group IDs (commonly C0004 Targeting, C0002 Performance) are configured per tenant \u2013 confirm the mapping in the OneTrust admin.",knownIssue:{text:"On opt-in (OneTrust geolocation) rules the recurring failure is load order: Optimize fires before OneTrust has resolved consent, so the first pageview is either lost or counted before the visitor agrees. Deny by default and only allow once the mapped group is active, reacting through OneTrust.OnConsentChanged as the snippet does."}},cookiebot:{name:"Cookiebot",gotcha:"Watch for: gating on the wrong category, which silently tracks the wrong visitors. Confirm the category matches where Optimize sits.",detect:"window.Cookiebot is present.",cat:{marketing:"marketing",analytics:"statistics",functional:"preferences"},catNote:"Reads Cookiebot.consent booleans (marketing, statistics, preferences) on the CookiebotOnAccept, OnDecline, and OnLoad events \u2013 the pattern Webflow documents for Cookiebot.",knownIssue:{text:"The real failure is gating on the wrong category. The bridge reads Cookiebot.consent.statistics (analytics) or .marketing (targeting), so picking the category that does not match where Optimize sits silently tracks the wrong visitors. Confirm the category in the Cookiebot admin. Separately, and expected rather than a bug: any posture change moves what gets tracked, so the Analyze number will differ from GA4 and shift when the posture changes."}},trustarc:{name:"TrustArc",gotcha:"Watch for: Auto Blocker blocking Optimize before any consent logic runs. The fix is a reclassification, included with the snippet.",detect:"window.truste is present (TrustArc Consent Manager).",cat:{marketing:"Advertising",analytics:"Functional",functional:"Functional"},catNote:"TrustArc emits no per-category JS event. This reads its PrivacyManagerAPI consent decision (the cmapi_cookie_privacy cookie) and checks the mapped category, rather than the trustarc.message example in Webflow's docs, which does not fire at runtime. The Auto Blocker reclassification below has to happen first, or nothing fires.",knownIssue:{text:"TrustArc Auto Blocker blocks the Optimize script (intellimizeditor.com/common.js) by classification before any consent logic can run, so nothing fires and there is no obvious error. The fix is to reclassify Optimize from Functional to Required so Auto Blocker stops blocking it, then gate with the bridge below."}},osano:{name:"Osano",gotcha:"Watch for: Osano saving consent after Optimize starts. Reading consent on load fixes that race.",detect:"window.Osano is present and Osano.cm is available.",cat:{marketing:"MARKETING",analytics:"ANALYTICS",functional:"PERSONALIZATION"},catNote:"Reads Osano.cm.getConsent() (ACCEPT or DENY per category) on load and re-applies on osano-cm-consent-saved. Osano also requires osano.js to be the first script in the head.",knownIssue:{text:"Osano can resolve and save consent after Optimize has already initialized, so the first pageview reads the wrong consent state (a race condition). Check Osano.cm.getConsent() on load for returning visitors and gate live changes on the osano-cm-consent-saved event, rather than assuming consent is ready when the snippet runs."}},cookieyes:{name:"CookieYes",gotcha:"Watch for: Optimize sitting in a category CookieYes auto-blocks. Confirm it with Verify mode on the page.",detect:"window.getCkyConsent is defined, or a cookieyes-consent cookie is set.",cat:{marketing:"advertisement",analytics:"analytics",functional:"functional"},catNote:"Reads getCkyConsent().categories on banner load and detail.accepted on consent update. If 'Reload page on consent action' is enabled in CookieYes it can strip the referrer \u2013 consider turning it off.",knownIssue:{text:"The recurring failure is CookieYes auto-blocking the Optimize script by category before any consent logic runs, so Optimize never loads and there is no obvious error. Confirm Optimize is not sitting in an auto-blocked category, then that the bridge grants once the mapped category is accepted. Check both on the live page rather than assuming the default placement is safe."}},usercentrics:{name:"Usercentrics",gotcha:"Watch for: confusing Usercentrics with the Cookiebot it now owns. They use different APIs \u2013 this is the UC_UI and ucEvent app, not the CookiebotOnAccept events.",detect:"window.UC_UI is present (Usercentrics Browser SDK).",cat:{marketing:"Webflow Optimize",analytics:"Webflow Optimize",functional:"Webflow Optimize"},catNote:"Gates on the Usercentrics data processing service for Optimize, commonly named 'Webflow Optimize' or 'Intellimize'. The bridge reads UC_UI.getServicesBaseInfo(), finds that service, and uses its consent.status, refreshing on the ucEvent. Confirm the exact service name in the Usercentrics admin. This is the Usercentrics app, a different API from the Cookiebot product Usercentrics owns.",knownIssue:{text:"Usercentrics now owns Cookiebot, and the two are easy to mix up: this app emits a ucEvent and exposes UC_UI.getServicesBaseInfo(), while the Cookiebot product uses the CookiebotOnAccept events. Wiring the wrong API is the common failure. Gate on the Optimize service's consent.status and re-read it on each ucEvent so returning visitors are handled as well."}},ketch:{name:"Ketch",gotcha:"Watch for: the Ketch banner showing but Optimize never receiving the decision, so tracking continues after a Deny. Wiring the consent event fixes it.",detect:"window.ketch or window.semaphore is present (Ketch Smart Tag), or a _ketch_consent_v1 cookie is set.",cat:{marketing:"advertising",analytics:"analytics",functional:"functional"},catNote:"Registers a Ketch consent listener through window.semaphore, the Smart Tag's queue, so it fires on cached, remote, and banner-interaction consent. Reads consent.purposes by purpose code. Purpose codes are configured per organization, so confirm them in the Ketch dashboard.",knownIssue:{text:"A common Ketch setup shows the banner correctly but never passes the decision to Optimize, so tracking keeps running even after a visitor selects Deny. Subscribe to Ketch's consent event through window.semaphore and gate on the relevant purpose code, rather than assuming the banner alone controls Optimize. The same wiring works whether the site is opt-in or opt-out."}},didomi:{name:"Didomi",gotcha:"Watch for: registering the consent listener inside didomiOnReady and missing the first event. Register it on didomiEventListeners instead.",detect:"window.Didomi is present, usually loaded from sdk.privacy-center.org.",cat:{marketing:"create_ads_profile",analytics:"measure_content_performance",functional:"functional"},catNote:"Reads Didomi.getCurrentUserStatus().purposes by purpose ID and listens for the consent.changed event through the didomiEventListeners queue, with didomiOnReady applying the initial state for returning visitors. Purpose IDs are configured per notice in the Didomi console (IAB TCF or custom), so confirm them, or gate on a custom vendor created for Optimize.",knownIssue:{text:"Didomi is TCF-oriented and its purpose and vendor IDs are configured per notice, so gating on the wrong ID silently denies or allows everything. Read getCurrentUserStatus().purposes for the configured ID, or a custom Optimize vendor, register the listener on didomiEventListeners so the first events are not missed, and confirm the IDs in the Didomi console."}},consentpro:{name:"Finsweet Consent Pro",native:!0,detect:"Finsweet Consent Pro \u2013 Webflow-native, installed through the Designer.",nativeNote:"Consent Pro is built and maintained by Finsweet and installs through the Webflow Designer, so it manages Optimize and Analyze tracking consent directly. No manual wf.allowUserTracking() bridge is needed \u2013 the integration sets the tracking default from the visitor's choice. It requires a paid Finsweet plan for production domains.",docUrl:"https://help.webflow.com/hc/en-us/articles/34394790067859-Integrate-Consent-Pro-for-consent-management",docLabel:"Integrate Consent Pro for consent management (Webflow Help)",nativeChecks:[["Tracking setting","Set Optimize and Analyze tracking to opt-out or opt-in in Webflow to match the posture the privacy team wants; Consent Pro enforces it from there."],["No manual snippet","Remove any hand-rolled wf.allowUserTracking() bridge so the two do not conflict."],["Plan","Consent Pro needs a paid Finsweet plan for production domains."]]},datagrail:{name:"DataGrail",native:!0,detect:"DataGrail \u2013 Webflow-native, connected through Google Tag Manager.",nativeNote:"DataGrail connects through Google Tag Manager, adding a consent banner tag and a Webflow plugin tag to the container, and sets the Optimize and Analyze tracking default from the visitor's consent. No manual wf.allowUserTracking() bridge is needed. This is the integration Webflow Support recommends when a site needs the Optimize and Analyze script to respect consent.",docUrl:"https://help.webflow.com/hc/en-us/articles/34394688342035-Integrate-DataGrail-for-consent-management",docLabel:"Integrate DataGrail for consent management (Webflow Help)",nativeChecks:[["Tracking setting","Set Optimize and Analyze tracking to opt-out or opt-in in Webflow to match the intended posture; DataGrail enforces it from there."],["No manual snippet","Remove any hand-rolled wf.allowUserTracking() bridge so the two do not conflict."],["GTM","The DataGrail banner tag and the Webflow plugin tag both need to be in the GTM container, and GTM has to load on every page."]]},custom:{name:"Other / custom",generic:!0,detect:"Any other consent platform, or a custom-built consent banner."}},qf=["onetrust","cookiebot","usercentrics","trustarc","osano","ketch","didomi","cookieyes","consentpro","datagrail","custom"];function od(e){return e==="hosted"?["<!-- Add this in Webflow: Site settings > Custom code > Head, or the page <head>. -->","<!-- Place it immediately after the consent platform's script. -->"].join(`

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

.root {
  --blue:#146EF5; --black:#080808; --white:#FFFFFF;
  --g900:#171717; --g800:#222222; --g700:#363636; --g500:#757575; --g400:#898989; --g100:#F0F0F0; --g200:#D8D8D8;
  --bg:var(--black); --surface:var(--g900); --surface2:var(--g800); --border:#2E2E2E; --border-2:#404040;
  --text:var(--white); --muted:var(--g400); --text-muted:#E5E5E5; --code-bg:#0c0c0c; --accent-text:#4F9CFF;
  --font-h:'Poppins',sans-serif; --font-b:'Inter',sans-serif; --font-mono:'JetBrains Mono','Menlo',monospace;
  font-family:var(--font-b); color:var(--text); background:var(--bg); color-scheme:dark;
  min-height:100%;
  -webkit-font-smoothing:antialiased;
}
.root[data-theme="light"] {
  --bg:var(--white); --surface:#FFFFFF; --surface2:var(--g100); --border:#E5E5E5; --border-2:#D8D8D8;
  --text:var(--black); --muted:#5A5A5A; --text-muted:#363636; --code-bg:#F7F7F7; --accent-text:#125FDB; color-scheme:light;
}
.root * { box-sizing:border-box; }

h1,h2,h3,h4 { font-family:var(--font-h); font-weight:600; letter-spacing:0.01em; margin:0; }
p { margin:0; line-height:1.6; color:var(--text-muted); }

.appbar { background:var(--bg); }
.appbar-inner { max-width:1000px; margin:0 auto; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; }
.tour-link { display:inline-flex; align-items:center; gap:7px; margin-top:14px; padding:7px 12px; border:1px solid var(--border); border-radius:7px; background:var(--surface); color:var(--text); font:500 13px Inter,system-ui,sans-serif; cursor:pointer; }
.tour-link:hover { border-color:var(--blue); }
.tour-link svg { color:var(--blue); flex:0 0 auto; }
.tour-overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:24px; }
.tour-modal { width:min(880px,100%); background:var(--bg); border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.5); }
.tour-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.tour-bar strong { font:600 14px Poppins,sans-serif; color:var(--text); }
.tour-x { cursor:pointer; color:var(--muted); background:none; border:none; font:500 13px Inter,system-ui,sans-serif; padding:4px 8px; }
.tour-x:hover { color:var(--text); }
.tour-frame { position:relative; width:100%; padding-bottom:56.25%; height:0; background:#000; }
.tour-frame iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
.logo { height:24px; width:auto; display:block; }
.theme { display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; padding:0; background:#171717; color:#E5E5E5; border:1px solid #363636; border-radius:50%; cursor:pointer; transition:background-color .2s ease, border-color .2s ease, color .2s ease; }
.theme:hover { background:#222222; color:#FFFFFF; }
.theme:focus-visible { outline:2px solid var(--blue); outline-offset:2px; }
.root[data-theme="light"] .theme { background:#F7F7F7; color:#363636; border-color:#D8D8D8; }
.root[data-theme="light"] .theme:hover { background:#F0F0F0; color:#080808; }
.theme .icon { display:block; }
.theme .icon-sun { display:block; }
.theme .icon-moon { display:none; }
.root[data-theme="light"] .theme .icon-sun { display:none; }
.root[data-theme="light"] .theme .icon-moon { display:block; }

.wrap { max-width:1000px; margin:0 auto; padding:56px 24px 96px; }

.intro { margin-bottom:48px; }
.eyebrow { font-family:var(--font-b); font-weight:500; font-size:0.8125rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent-text); margin-bottom:14px; }
.intro h1 { font-size:2.6rem; line-height:1.05; margin-bottom:14px; }
.lede { font-size:1.125rem; color:var(--muted); }
.auth { display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; }
.pill { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:0.8125rem; color:var(--muted); }
.pill svg { color:var(--blue); }

.tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:40px; }
.detected-banner { display:flex; align-items:flex-start; gap:12px; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--blue); border-radius:8px; padding:14px 16px; margin-bottom:24px; }
.detected-banner .db-body { flex:1; font-size:0.875rem; }
.detected-banner .db-title { font-weight:600; color:var(--text); margin-bottom:6px; }
.detected-banner .db-sub { color:var(--muted); }
.detected-banner .db-dismiss { background:transparent; border:0; color:var(--muted); cursor:pointer; font-size:1.2rem; line-height:1; padding:0 2px; }
.detected-banner .db-dismiss:hover { color:var(--text); }
.tab { text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer; transition:border-color .15s ease, transform .15s ease; }
.tab:hover { border-color:var(--blue); }
.tab.active { border-color:var(--blue); box-shadow:inset 0 0 0 1px var(--blue); }
.tab-title { display:block; font-family:var(--font-h); font-weight:600; font-size:1rem; margin-bottom:4px; color:var(--text); }
.tab-desc { display:block; font-size:0.875rem; color:var(--muted); line-height:1.45; }

.panel { }

.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:22px; margin-bottom:32px; }
.card.subtle { background:transparent; }
.block { margin-bottom:36px; }
.block h4 { font-size:1.25rem; margin-bottom:16px; }
.block > .muted { margin-bottom:14px; }
.stack > .block { margin-bottom:0; }
.card h4 { font-size:1.25rem; margin-bottom:12px; }
.card > .muted { margin-bottom:14px; }
.step-help { margin-bottom:16px; }
.category-note { margin-top:16px; padding:10px 14px; border-left:2px solid var(--border-2); font-size:0.8125rem; color:var(--muted); line-height:1.5; }

.muted { color:var(--muted); }
.small { font-size:0.875rem; }

.optionlist { display:flex; flex-direction:column; gap:14px; }
.option { text-align:left; background:transparent; border:1px solid var(--border); border-radius:8px; padding:18px 18px; cursor:pointer; transition:border-color .12s ease, background .12s ease; }
.option:hover { border-color:#5A5A5A; }
.option.selected { border-color:var(--blue); box-shadow:inset 0 0 0 1px var(--blue); }
.option-head { display:flex; align-items:center; gap:10px; }
.radio { width:14px; height:14px; border-radius:999px; border:1.5px solid var(--g500); flex:0 0 auto; }
.option.selected .radio { border-color:var(--blue); background:radial-gradient(circle, var(--blue) 0 4px, transparent 5px); }
